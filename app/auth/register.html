<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, minimum-scale=1.0">
    <title>Register - TrailGuard</title>
    <link rel="stylesheet" href="static/css/style.css">
</head>
<body>

    <!-- Navigation Bar -->
    <nav class="navbar">
        <div class="nav-container">
            <a href="trails.html" class="nav-logo">
                <span>🌲</span> TrailGuard
            </a>
            <ul class="nav-links">
                <li><a href="trails.html" class="nav-link">Trails</a></li>
                <li><a href="login.html" class="nav-link">Login</a></li>
                <li><a href="register.html" class="nav-link active">Register</a></li>
            </ul>
        </div>
    </nav>

    <!-- Main Content -->
    <main class="main-content">
        <div class="auth-card">
            <div class="auth-header">
                <h1>Create Account</h1>
                <p>Register to explore safely and stay connected</p>
            </div>
            
            <form onsubmit="event.preventDefault(); window.location.href='trails.html';">
                <!-- User Account Info -->
                <div class="form-group">
                    <label class="form-label" for="name">Full Name</label>
                    <input class="form-input" type="text" id="name" placeholder="John Doe" required>
                </div>

                <div class="form-group">
                    <label class="form-label" for="email">Email Address</label>
                    <input class="form-input" type="email" id="email" placeholder="john@example.com" required>
                </div>
                
                <div class="form-group">
                    <label class="form-label" for="password">Password</label>
                    <input class="form-input" type="password" id="password" placeholder="••••••••" required>
                </div>

                <!-- Emergency Contact Section Divider -->
                <hr class="section-divider" data-label="Emergency Contact">

                <!-- Emergency Contact Info -->
                <div class="form-group">
                    <label class="form-label" for="contact-name">Contact Full Name</label>
                    <input class="form-input" type="text" id="contact-name" placeholder="Jane Doe (e.g. Spouse/Parent)" required>
                </div>

                <div class="form-group-row">
                    <div class="form-group">
                        <label class="form-label" for="contact-phone">Contact Phone</label>
                        <input class="form-input" type="tel" id="contact-phone" placeholder="+254 700 000000" required>
                    </div>
                    
                    <div class="form-group">
                        <label class="form-label" for="contact-email">Contact Email</label>
                        <input class="form-input" type="email" id="contact-email" placeholder="jane@example.com" required>
                    </div>
                </div>
                
                <button type="submit" class="btn-primary">Create Account</button>
            </form>
            
            <div class="auth-footer">
                Already registered? <a href="login.html">Login here</a>
            </div>
        </div>
    </main>

    <!-- Persistent SOS Button -->
    <button class="sos-button" onclick="alert('SOS Alert activated! Dispatching emergency contacts...')">SOS</button>

</body>
</html>
